<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jakarta Connect | Community Portal</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Serif+Display:ital@0;1&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="background-slideshow">
    <div class="bg-slide active"></div>
    <div class="bg-slide"></div>
</div>

    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>
    <div class="orb orb-1"></div>

    <div class="user-status-box" id="user-info-box">
        <div class="status-header">
            <span class="status-dot"></span>
            <span>ONLINE_USERS</span>
        </div>
        <div id="online-list-content">
            <span class="online-user-item">ACCESSING...</span>
        </div>
    </div>

    <nav class="navbar" id="mainNav">
        <div class="nav-flex">
            <a href="index.html" class="logo">Jakarta-<span>Connect</span></a>
            
            <button class="mobile-menu-btn" id="menuToggle">
                <i data-lucide="menu"></i>
            </button>

<ul class="nav-links" id="navLinks">
    <li><a href="pages/board.html">Community</a></li>
    <li><a href="pages/market.html">Marketplace</a></li>
    <li><a href="pages/info.html">Local Info</a></li>
<li>
    <a href="./blog.html" class="wavy-3d-link">
        <span class="wavy-3d-text">Jakarta Blog</span>
    </a>
</li>   
    <li style="margin-left: 20px;"><a href="login.html" id="login-btn">Login</a></li>
    <li><a href="signup.html" id="signup-btn">Sign Up</a></li>
</ul>

        </div>
    </nav>

    <header class="hero">
        <div class="hero-grid"></div>
        <div class="hero-content">
            <h1 class="hero-title">Welcome to<br><em>Jakarta Connect</em></h1>
            <p class="hero-subtitle">Real-time hub for Jakarta information</p>
        </div>
    </header>

    <main class="container">
        <section id="room-section">
            <div class="section-title">Active Chat Rooms</div>
            <div id="room-list" class="room-grid">
                <p class="loading-text">Synchronizing data...</p>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        &copy; 2026 JAKARTA CONNECT // NEURO-DARK INTERFACE
    </footer>


<script type="module">

// ==========================================================
// 1. Firebase Imports & Initialization (최상단 배치)
// ==========================================================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
    getDatabase, ref, onValue, set, get, onDisconnect, serverTimestamp 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    databaseURL: "https://jakor-52390-default-rtdb.firebaseio.com/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app); // ✅ db를 먼저 선언해야 하위 함수에서 참조 가능

// ==========================================================
// 2. Background Slideshow Logic (Pexels API)
// ==========================================================
let PEXELS_API_KEY = null;
const slides = document.querySelectorAll('.bg-slide');
let currentBgIndex = 0;

// Firebase에서 Pexels API Key 불러오기
async function loadPexelsKey() {
    try {
        const snap = await get(ref(db, 'PexelAPI'));
        if (snap.exists()) {
            PEXELS_API_KEY = snap.val();
            console.log("Pexels API Loaded from Firebase");
        } else {
            console.error("PexelAPI not found in Firebase");
        }
    } catch (e) {
        console.error("API Key Load Error:", e);
    }
}

// Jakarta 랜덤 이미지 가져오기
async function getJakartaImage() {
    if (!PEXELS_API_KEY) return null;
    try {
        const response = await fetch(
            "https://api.pexels.com/v1/search?query=jakarta city&per_page=20",
            { headers: { Authorization: PEXELS_API_KEY } }
        );
        const data = await response.json();
        const photos = data.photos;
        if (!photos || photos.length === 0) return null;
        const randomPhoto = photos[Math.floor(Math.random() * photos.length)];
        return randomPhoto.src.landscape;
    } catch (e) {
        console.error("Pexels Load Error:", e);
        return null;
    }
}

async function setSlideBackground(slide) {
    const imgUrl = await getJakartaImage();
    if (imgUrl) {
        slide.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)), url('${imgUrl}')`;
        slide.style.backgroundSize = "cover";
        slide.style.backgroundPosition = "center";
    }
}

async function changeBackgroundSlide() {
    if (slides.length === 0) return;
    slides[currentBgIndex].classList.remove('active');
    const nextIndex = (currentBgIndex + 1) % slides.length;
    await setSlideBackground(slides[nextIndex]);
    currentBgIndex = nextIndex;
    slides[currentBgIndex].classList.add('active');
}

// 초기 배경 실행 함수
async function initBackground() {
    await loadPexelsKey(); // Firebase에서 Key 로드
    if (slides.length > 0) {
        // 첫 번째 슬라이드 즉시 로드
        await setSlideBackground(slides[0]);
        slides[0].classList.add('active');
    }
    setInterval(changeBackgroundSlide, 6000);
}

// ==========================================================
// 3. User Presence & Auth Logic
// ==========================================================
async function updateOnlineStatus(userId) {
    if (!userId) return;
    const myStatusRef = ref(db, 'onlineUsers/' + userId);
    let ipData = { ip: "Internal_Node", country: "Jakarta" };

    try {
        const response = await fetch('https://ipapi.co/json/').catch(() => null);
        if (response && response.ok) {
            const data = await response.json();
            ipData.ip = data.ip || "Hidden";
            ipData.country = data.country_name || "Indonesia";
        }
    } catch (error) {}

    try {
        const currentPos = location.pathname.includes('chat.html') ? "CHAT_ROOM" : "LOBBY";
        await set(myStatusRef, { 
            id: userId, ip: ipData.ip, country: ipData.country,
            status: currentPos, lastChanged: serverTimestamp() 
        });
        onDisconnect(myStatusRef).remove(); 
    } catch (err) { console.error(err); }
}

window.handleLogout = (e) => {
    e.preventDefault();
    if(confirm("Do you want to log out of the system?")) {
        sessionStorage.clear();
        alert("Logged out successfully.");
        location.reload();
    }
};

window.onload = async () => {
    const isLoggedIn = sessionStorage.getItem('isLoggedIn');
    let userId = sessionStorage.getItem('userId');
    const loginBtn = document.getElementById('login-btn');
    const signupBtn = document.getElementById('signup-btn');
    const navLinksList = document.querySelector('.nav-links');

    if (isLoggedIn === 'true' && userId) {
        let userAvatar = "👤"; 
        try {
            const userSnap = await get(ref(db, `users/${userId}`));
            if (userSnap.exists() && userSnap.val().avatar) {
                let avatarData = userSnap.val().avatar;
                if (avatarData.startsWith('../')) {
                    userAvatar = avatarData.replace('../', ''); 
                } else if (avatarData.includes('image-') && !avatarData.includes('/')) {
                    userAvatar = `images/profiles/${avatarData}`;
                } else {
                    userAvatar = avatarData;
                }
            }
        } catch (e) { console.error("Avatar Load Error:", e); }

        const avatarHtml = (userAvatar.includes('/') || userAvatar.includes('http')) 
            ? `<img src="${userAvatar}" style="width:32px; height:32px; border-radius:50%; vertical-align:middle; margin-right:8px; border:1px solid var(--cyan); object-fit:cover;" onerror="this.src='https://ui-avatars.com/api/?name=${userId}'">` 
            : `<span style="margin-right:8px; font-size:1.5rem; vertical-align:middle;">${userAvatar}</span>`;

        loginBtn.innerHTML = `${avatarHtml}LOGOUT (${userId})`;
        loginBtn.href = "#";
        loginBtn.addEventListener('click', window.handleLogout);

        signupBtn.innerText = "EDIT_PROFILE";
        signupBtn.href = "profile.html";

        if (userId === 'admin') {
            const adminLi = document.createElement('li');
            adminLi.style.marginLeft = "10px";
            adminLi.innerHTML = `<a href="admin.html" style="color:var(--gold); border:1px solid var(--gold); padding:5px 10px; border-radius:4px; font-weight:bold;">ADMIN_PANEL</a>`;
            navLinksList.insertBefore(adminLi, loginBtn.parentElement);
        }
    } else {
        if(!sessionStorage.getItem('guestId')) {
            sessionStorage.setItem('guestId', 'User_' + Math.floor(Math.random() * 1000));
        }
        userId = sessionStorage.getItem('guestId');
    }
    updateOnlineStatus(userId);
    if(window.lucide) lucide.createIcons();
};

// 실시간 접속자 업데이트
const onlineListDiv = document.getElementById('online-list-content');
onValue(ref(db, 'onlineUsers'), (snapshot) => {
    const users = snapshot.val();
    const myCurrentId = sessionStorage.getItem('userId') || sessionStorage.getItem('guestId');
    onlineListDiv.innerHTML = ''; 
    if (users) {
        Object.keys(users).forEach(key => {
            const user = users[key];
            const isMe = user.id === myCurrentId;
            onlineListDiv.innerHTML += `
                <div class="online-user-item ${isMe ? 'me-blink' : ''}" title="IP: ${user.ip}" style="display: block; margin-bottom: 4px;">
                    > ${user.id} ${isMe ? '(YOU)' : ''} 
                    <small style="color:var(--text-soft); font-size:0.5rem;">(${user.country})</small>
                </div>`;
        });
    } else {
        onlineListDiv.innerHTML = '<div class="online-user-item">NO ACTIVE USERS</div>';
    }
});

// ==========================================================
// 4. UI Animations (Scroll & Cursor)
// ==========================================================
window.addEventListener('scroll', () => {
    const mainNav = document.getElementById('mainNav');
    if(mainNav) mainNav.classList.toggle('scrolled', window.scrollY > 50);
});

const dot = document.getElementById('cursor-dot');
const ring = document.getElementById('cursor-ring');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => { 
    mx = e.clientX; my = e.clientY; 
    if(dot) { dot.style.left = mx-3+'px'; dot.style.top = my-3+'px'; }
});
(function anim() { 
    rx += (mx-rx)*0.1; ry += (my-ry)*0.1; 
    if(ring) { ring.style.left = rx+'px'; ring.style.top = ry+'px'; }
    requestAnimationFrame(anim); 
})();

// ==========================================================
// 5. Chat Room Rendering
// ==========================================================
const roomListContainer = document.getElementById('room-list');
const defaultRooms = [
    { id: 'general', title: 'Global Terminal', desc: 'Jakarta Information Unified Lobby' },
    { id: 'market', title: 'Trade Sector', desc: 'Used goods trading and sharing information' },
    { id: 'tech', title: 'Neuro Network', desc: 'Discussion of technology and local infrastructure' }
];

window.enterRoom = async (roomId) => {
    const snapshot = await get(ref(db, `rooms/${roomId}/participants`));
    const count = snapshot.exists() ? Object.keys(snapshot.val()).length : 0;
    if (count >= 50) { alert(`ROOM FULL (Max 50)`); return; }
    location.href = `chat.html?room=${roomId}`;
};

function renderRooms() {
    if(!roomListContainer) return;
    roomListContainer.innerHTML = '';
    defaultRooms.forEach(room => {
        const roomCard = document.createElement('div');
        roomCard.className = 'card';
        roomCard.innerHTML = `
            <div class="user-popup" id="popup-${room.id}">
                <h4>ACTIVE_USERS</h4>
                <div class="popup-user-list" id="list-${room.id}">Scanning...</div>
            </div>
            <h3>// ${room.title}</h3>
            <p>${room.desc}</p>
            <button onclick="window.enterRoom('${room.id}')" style="margin-top:15px; background:var(--gold); border:none; padding:8px 15px; font-family:'Space Mono'; font-weight:bold; cursor:pointer; width:100%;">ENTER_ROOM</button>
        `;
        roomListContainer.appendChild(roomCard);

        onValue(ref(db, `rooms/${room.id}/participants`), (snapshot) => {
            const listElement = document.getElementById(`list-${room.id}`);
            if (!listElement) return;
            const participants = snapshot.val();
            if (participants) {
                const userIds = Object.keys(participants);
                listElement.innerHTML = userIds.map(uid => `<div style="display: block; margin-bottom: 4px;">> ${uid}</div>`).join('');
                roomCard.querySelector('h3').innerHTML = `// ${room.title} <small style="font-size:0.8rem; color:var(--gold)">(${userIds.length})</small>`;
            } else {
                listElement.innerHTML = '<div style="opacity:0.5;">Empty Sector</div>';
                roomCard.querySelector('h3').innerHTML = `// ${room.title}`;
            }
        });
    });
}
renderRooms();

// ==========================================================
// 6. Mobile Optimization & Menu Toggle
// ==========================================================
const setVh = () => {
    document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
};
window.addEventListener('resize', setVh);
setVh();

const menuToggle = document.getElementById('menuToggle');
const navLinksContainer = document.getElementById('navLinks');

if (menuToggle && navLinksContainer) {
    menuToggle.addEventListener('click', () => {
        navLinksContainer.classList.toggle('active');
        const icon = menuToggle.querySelector('i');
        if (icon) {
            const isOpened = navLinksContainer.classList.contains('active');
            icon.setAttribute('data-lucide', isOpened ? 'x' : 'menu');
            if (window.lucide) lucide.createIcons();
        }
    });

    navLinksContainer.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
            navLinksContainer.classList.remove('active');
            const icon = menuToggle.querySelector('i');
            if (icon) {
                icon.setAttribute('data-lucide', 'menu');
                if (window.lucide) lucide.createIcons();
            }
        });
    });
}

// 🔥 최하단에서 배경화면 시스템 시작
initBackground();

</script>
</body>
</html>
