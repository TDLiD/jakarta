<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jakarta Connect | Community Portal</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Serif+Display:ital@0;1&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="background-slideshow">
    <div class="bg-slide active"></div>
    <div class="bg-slide"></div>
</div>

    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>
    <div class="orb orb-1"></div>

    <div class="user-status-box" id="user-info-box">
        <div class="status-header">
            <span class="status-dot"></span>
            <span>ONLINE_USERS</span>
        </div>
        <div id="online-list-content">
            <span class="online-user-item">ACCESSING...</span>
        </div>
    </div>

    <nav class="navbar" id="mainNav">
        <div class="nav-flex">
            <a href="index.html" class="logo">Jakarta-<span>Connect</span></a>
            
            <ul class="nav-links">
                <li><a href="pages/board.html">Community</a></li>
                <li><a href="pages/market.html">Marketplace</a></li>
                <li><a href="pages/info.html">Local Info</a></li>
                <li style="margin-left: 20px;"><a href="login.html" id="login-btn">Login</a></li>
                <li><a href="signup.html" id="signup-btn">Sign Up</a></li>
            </ul>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-grid"></div>
        <div class="hero-content">
            <h1 class="hero-title">Welcome to<br><em>Jakarta Connect</em></h1>
            <p class="hero-subtitle">Real-time hub for Jakarta information</p>
        </div>
    </header>

    <main class="container">
        <section id="room-section">
            <div class="section-title">Active Chat Rooms</div>
            <div id="room-list" class="room-grid">
                <p class="loading-text">Synchronizing data...</p>
            </div>
        </section>

    </main>

    <footer class="main-footer">
        &copy; 2026 JAKARTA CONNECT // NEURO-DARK INTERFACE
    </footer>

<script type="module">

// [새로운 배경 로직] 페이지 로드마다 랜덤 자카르타 이미지
const jakartaImages = [
    'https://images.unsplash.com/photo-1555899434-94d1285a46b2?w=1920&q=80', // Monas
    'https://images.unsplash.com/photo-1587474260584-136574528ed5?w=1920&q=80', // Jakarta Night
    'https://images.unsplash.com/photo-1596422846543-75c6fc197f07?w=1920&q=80', // Istiqlal Mosque
    'https://images.unsplash.com/photo-1562602833-0f4ab2fc46e3?w=1920&q=80', // Jakarta Skyline
    'https://images.unsplash.com/photo-1568322445389-f64ac2515020?w=1920&q=80', // Jakarta Downtown
    'https://images.unsplash.com/photo-1559628376-f3fe5f782a2e?w=1920&q=80', // Jakarta City
];

const slides = document.querySelectorAll('.bg-slide');
let currentSlide = 0;

// 랜덤 이미지 배열 생성 (중복 없이)
function getShuffledImages() {
    const shuffled = [...jakartaImages].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, slides.length);
}

// 초기 이미지 설정
const selectedImages = getShuffledImages();
slides.forEach((slide, index) => {
    const img = new Image();
    img.src = selectedImages[index];
    img.onload = () => {
        slide.style.backgroundImage = `linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.5)), url('${selectedImages[index]}')`;
        if (index === 0) {
            slide.classList.add('active');
        }
    };
    img.onerror = () => {
        // 이미지 로드 실패 시 기본 그라디언트 배경
        slide.style.background = 'linear-gradient(135deg, #0a1520 0%, #020407 100%)';
        if (index === 0) {
            slide.classList.add('active');
        }
    };
});

// 자동 슬라이드 전환 (6초마다)
function nextSlide() {
    slides[currentSlide].classList.remove('active');
    currentSlide = (currentSlide + 1) % slides.length;
    slides[currentSlide].classList.add('active');
}

setInterval(nextSlide, 6000);

    // 1. 필요한 함수(get 등)를 상단 import 문에 모두 모았습니다.
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
        getDatabase, 
        ref, 
        onValue, 
        set, 
        get, 
        onDisconnect, 
        serverTimestamp 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        databaseURL: "https://jakor-52390-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

async function updateOnlineStatus(userId) {
    if (!userId) return;

    const myStatusRef = ref(db, 'onlineUsers/' + userId);
    
    // 1. 기본값 설정 (API 호출 실패 시 이 값이 Firebase에 저장됩니다)
    let ipData = { ip: "Internal_Node", country: "Jakarta" };

    try {
        // fetch 옵션에 에러 핸들링을 강화합니다.
        const response = await fetch('https://ipapi.co/json/').catch(() => null);
        
        if (response && response.ok) {
            const data = await response.json();
            ipData.ip = data.ip || "Hidden";
            ipData.country = data.country_name || "Indonesia";
        } else {
            // 429 에러나 CORS 에러 시 여기로 들어옵니다.
            console.warn("[System] IP API access limited. Using default terminal values.");
        }
    } catch (error) {
        // 어떠한 예외 상황에서도 시스템이 멈추지 않도록 합니다.
    }

    try {
        const currentPos = location.pathname.includes('chat.html') ? "CHAT_ROOM" : "LOBBY";

        // 2. Firebase 저장 (IP 획득 여부와 상관없이 무조건 실행)
        await set(myStatusRef, { 
            id: userId, 
            ip: ipData.ip,
            country: ipData.country,
            status: currentPos,
            lastChanged: serverTimestamp() 
        });

        // 접속 종료 시 자동 삭제 설정
        onDisconnect(myStatusRef).remove(); 
        console.log(`[System] Online status updated for ${userId} at ${currentPos}`);

    } catch (err) {
        console.error("Firebase Sync Error:", err);
    }
}

    window.handleLogout = (e) => {
        e.preventDefault();
        if(confirm("Do you want to log out of the system?")) {
            sessionStorage.clear();
            alert("Logged out successfully.");
            location.reload();
        }
    };

window.onload = async () => { // async 추가
    // B. Login Check and User ID Setup
    const isLoggedIn = sessionStorage.getItem('isLoggedIn');
    let userId = sessionStorage.getItem('userId');
    const loginBtn = document.getElementById('login-btn');
    const signupBtn = document.getElementById('signup-btn');
    const navLinks = document.querySelector('.nav-links');

// window.onload 내부의 로그인 체크 로직 수정
if (isLoggedIn === 'true' && userId) {
    // --- 유저 아바타 가져오기 루틴 ---
    let userAvatar = "👤"; // 기본값 (이모티콘)
    try {
        const userSnap = await get(ref(db, `users/${userId}`));
        if (userSnap.exists() && userSnap.val().avatar) {
            userAvatar = userSnap.val().avatar;
        }
    } catch (e) { console.error("Avatar load error:", e); }

// [수정 포인트] width와 height를 30px로 변경하고, vertical-align을 조절했습니다.
const avatarHtml = userAvatar.includes('/') 
    ? `<img src="${userAvatar}" style="width:50px; height:50px; border-radius:50%; vertical-align:middle; margin-right:10px; border:1px solid var(--cyan); object-fit:cover;">` 
    : `<span style="margin-right:8px; font-size:1.5rem; vertical-align:middle;">${userAvatar}</span>`;

// 버튼 텍스트 수정 및 아바타 적용
loginBtn.innerHTML = `${avatarHtml}LOGOUT (${userId})`;
    loginBtn.href = "#";
    loginBtn.addEventListener('click', window.handleLogout);
    
    signupBtn.innerText = "EDIT_PROFILE";
    signupBtn.href = "profile.html"; // 경로 확인 필요 (pages 폴더 안에 있다면)


        // --- 관리자 체크 루틴 ---
        if (userId === 'admin') {
            const adminLi = document.createElement('li');
            adminLi.style.marginLeft = "10px";
            adminLi.innerHTML = `
                <a href="admin.html" style="color:var(--gold); border:1px solid var(--gold); padding:5px 10px; border-radius:4px; font-weight:bold;">
                    ADMIN_PANEL
                </a>
            `;
            navLinks.insertBefore(adminLi, loginBtn.parentElement);
        }

    } else {
        // 비로그인 유저 게스트 ID 부여
        if(!sessionStorage.getItem('guestId')) {
            sessionStorage.setItem('guestId', 'User_' + Math.floor(Math.random() * 1000));
        }
        userId = sessionStorage.getItem('guestId');
    }

    // C. 접속 정보 갱신
    updateOnlineStatus(userId);
};

// D. Real-time online users list update
    const onlineListDiv = document.getElementById('online-list-content');
    
    onValue(ref(db, 'onlineUsers'), (snapshot) => {
        const users = snapshot.val();
        // 현재 접속자 본인의 ID 확인 (로그인 ID 우선, 없으면 게스트 ID)
        const myCurrentId = sessionStorage.getItem('userId') || sessionStorage.getItem('guestId');
        
        onlineListDiv.innerHTML = ''; 
if (users) {
        Object.keys(users).forEach(key => {
            const user = users[key];
            const isMe = user.id === myCurrentId;
            
            // <span>을 <div>로 변경하면 자동으로 세로 정렬됩니다.
            onlineListDiv.innerHTML += `
                <div class="online-user-item ${isMe ? 'me-blink' : ''}" title="IP: ${user.ip}" style="display: block; margin-bottom: 4px;">
                    > ${user.id} ${isMe ? '(YOU)' : ''} 
                    <small style="color:var(--text-soft); font-size:0.5rem;">(${user.country})</small>
                </div>`;
        });
    } else {
        onlineListDiv.innerHTML = '<div class="online-user-item">NO ACTIVE USERS</div>';
    }
    });

    // E. UI Animations
    window.addEventListener('scroll', () => {
        document.getElementById('mainNav').classList.toggle('scrolled', window.scrollY > 50);
    });

    const dot = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    let mx = 0, my = 0, rx = 0, ry = 0;
    document.addEventListener('mousemove', e => { 
        mx = e.clientX; my = e.clientY; 
        dot.style.left = mx-3+'px'; dot.style.top = my-3+'px'; 
    });
    (function anim() { 
        rx += (mx-rx)*0.1; ry += (my-ry)*0.1; 
        ring.style.left = rx+'px'; ring.style.top = ry+'px'; 
        requestAnimationFrame(anim); 
    })();

// F. 채팅방 목록 불러오기 및 실시간 참여자 팝업 기능
const roomListContainer = document.getElementById('room-list');

const defaultRooms = [
    { id: 'general', title: 'Global Terminal', desc: 'Jakarta Information Unified Lobby' },
    { id: 'market', title: 'Trade Sector', desc: 'Used goods trading and sharing information' },
    { id: 'tech', title: 'Neuro Network', desc: 'Discussion of technology and local infrastructure' }
];

// [추가] 입장 권한 확인 함수
window.enterRoom = async (roomId) => {
    const isLoggedIn = sessionStorage.getItem('isLoggedIn');
    if (isLoggedIn !== 'true') {
        alert("ACCESS DENIED: Login required.");
        return;
    }

    // [추가] 인원 제한 체크 로직
    const participantsRef = ref(db, `rooms/${roomId}/participants`);
    const snapshot = await get(participantsRef);
    const count = snapshot.exists() ? Object.keys(snapshot.val()).length : 0;

    const MAX_USER = 50; // 제한 인원 설정
    if (count >= MAX_USER) {
        alert(`ROOM FULL: Maximum ${MAX_USER} users allowed.`);
        return;
    }

    location.href = `chat.html?room=${roomId}`;
};

function renderRooms() {
    roomListContainer.innerHTML = '';
    
    defaultRooms.forEach(room => {
        const roomCard = document.createElement('div');
        roomCard.className = 'card';
        
        roomCard.innerHTML = `
            <div class="user-popup" id="popup-${room.id}">
                <h4>ACTIVE_USERS</h4>
                <div class="popup-user-list" id="list-${room.id}">
                    Scanning...
                </div>
            </div>
            <h3>// ${room.title}</h3>
            <p>${room.desc}</p>
            <button onclick="window.enterRoom('${room.id}')" 
                    style="margin-top:15px; background:var(--gold); border:none; padding:8px 15px; 
                    font-family:'Space Mono'; font-weight:bold; cursor:pointer; width:100%;">
                ENTER_ROOM
            </button>
        `;
        roomListContainer.appendChild(roomCard);

        const participantsRef = ref(db, `rooms/${room.id}/participants`);
        onValue(participantsRef, (snapshot) => {
            const listElement = document.getElementById(`list-${room.id}`);
            if (!listElement) return;

            const participants = snapshot.val();
            if (participants) {
                const userIds = Object.keys(participants);
                // <span> 대신 <div>를 사용하고 세로 정렬을 위한 클래스나 스타일을 적용합니다.
                listElement.innerHTML = userIds.map(uid => 
                    `<div style="display: block; margin-bottom: 4px;">> ${uid}</div>`
                ).join('');
                roomCard.querySelector('h3').innerHTML = `// ${room.title} <small style="font-size:0.8rem; color:var(--gold)">(${userIds.length})</small>`;
            } else {
                listElement.innerHTML = '<div style="opacity:0.5;">Empty Sector</div>';
                roomCard.querySelector('h3').innerHTML = `// ${room.title}`;
            }
        });
    });
}
renderRooms();


</script>
</body>
</html>
