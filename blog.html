<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jakarta Journal | Discover Indonesia</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Serif+Display:ital@0;1&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <!-- Main Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/style-blog.css">

</head>
<body>

    <!-- Cursor Effects -->
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <!-- Ambient Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Particles -->
    <div class="particle" style="width:3px;height:3px;left:15%;bottom:0;animation-duration:8s;animation-delay:0s;"></div>
    <div class="particle" style="width:2px;height:2px;left:35%;bottom:0;animation-duration:10s;animation-delay:2s;"></div>
    <div class="particle" style="width:4px;height:4px;left:55%;bottom:0;animation-duration:7s;animation-delay:4s;background:var(--gold);"></div>
    <div class="particle" style="width:2px;height:2px;left:75%;bottom:0;animation-duration:9s;animation-delay:1s;"></div>
    <div class="particle" style="width:3px;height:3px;left:90%;bottom:0;animation-duration:11s;animation-delay:3s;"></div>

    <!-- Dynamic Header Placeholder -->
    <div id="header-placeholder"></div>

    <!-- Hero Section -->
    <header class="hero" id="mainHero">
        <div class="hero-grid"></div>
        <div class="hero-bg" id="heroBg"></div>
        <div class="hero-overlay"></div>
        <div class="scan-line"></div>
        <div class="hero-content">
            <div class="hero-ai-tag">
                <span class="ai-dot"></span>
                AI-Curated Travel Intelligence
                <span class="ai-dot" style="animation-delay:.5s"></span>
            </div>
            <div class="hero-badge">THE SOUL OF JAVA</div>
            <h1 class="hero-title" id="heroTitle">
                Wonderful<br><em>Jakarta</em>
            </h1>
            <p class="hero-subtitle" id="heroSubtitle">
                Exploring the vibrant fusion of heritage and high-rise.
            </p>
            <div class="hero-scroll" onclick="document.querySelector('main').scrollIntoView({behavior:'smooth'})">
                <div class="mouse"></div>
                <span>SCROLL</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <div class="main-layout">
            <section id="postContainer"></section>

            <aside class="sidebar">
                <div class="sidebar-card">
                    <h3>// The Journal</h3>
                    <p id="aboutText">Curating the best travel experiences across Jakarta — where tradition meets tomorrow.</p>
                </div>
                <div class="sidebar-card" id="statCard" style="display:none;">
                    <h3>// System Stats</h3>
                    <div id="statRows"></div>
                </div>
            </aside>
        </div>
    </main>

    <!-- Scripts -->
    <script src="assets/js/app.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://jakor-52390-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

/* ── 1. [수정] Header Loader: 경로 보정 및 Wavy 애니메이션 추가 ── */
async function loadHeader() {
    try {
        const response = await fetch('components/header.html');
        if (!response.ok) throw new Error('Header not found');
        
        const data = await response.text();
        const placeholder = document.getElementById('header-placeholder');
        if (placeholder) {
            placeholder.innerHTML = data;

            // index.html과 마찬가지로 루트에 있으므로 경로에서 ../ 제거
            const links = placeholder.querySelectorAll('a');
            links.forEach(link => {
                let href = link.getAttribute('href');
                if (href && !href.startsWith('http') && !href.startsWith('#')) {
                    link.setAttribute('href', href.replace('../', ''));
                }
            });

            // Wavy 애니메이션 실행 (header.html에 정의된 함수 호출)
            if (typeof window.initWavyMenu === 'function') {
                window.initWavyMenu();
            }

            // UI 요소 초기화
            if (window.lucide) lucide.createIcons();
            
            const mainNav = document.getElementById('mainNav');
            if (mainNav) {
                window.addEventListener('scroll', () => {
                    mainNav.classList.toggle('scrolled', window.scrollY > 40);
                }, { passive: true });
            }

            setupMobileMenu();
            await updateAuthUI();
        }
    } catch (err) {
        console.error("Header Load Error:", err);
    }
}

/* ── 6. [수정] Stats Loader: Firebase 10(SDK) 방식으로 통일 ── */
async function loadStats() {
    try {
        // 1. 상단에서 import한 db, ref, get을 사용하여 데이터 가져오기
        const statsRef = ref(db, 'stats');
        const statsSnap = await get(statsRef);
        
        if (statsSnap.exists()) {
            const s = statsSnap.val();
            const card = document.getElementById('statCard');
            const rows = document.getElementById('statRows');

            if (card && rows) {
                // 데이터가 있으면 카드를 표시
                card.style.display = 'block';
                
                // HTML 초기화 후 데이터 삽입 (visits가 없을 경우를 대비해 0 처리)
                const visits = s.visits ? s.visits.toLocaleString() : "0";
                
                rows.innerHTML = `
                    <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-family:var(--font-mono); font-size:0.7rem;">
                        <span style="color:var(--text-soft);">SYSTEM_VISITS</span>
                        <span style="color:var(--cyan); font-weight: bold;">${visits}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; padding:10px 0; font-family:var(--font-mono); font-size:0.7rem;">
                        <span style="color:var(--text-soft);">DATABASE_STATUS</span>
                        <span style="color:var(--gold); font-weight: bold;">ONLINE</span>
                    </div>
                `;
            }
        } else {
            console.log("No stats data available");
        }
    } catch (e) {
        console.error("Stats Load Error (Firebase V10):", e);
    }
}

        /* ── 2. Mobile Menu Setup (Same as index.html) ── */
        function setupMobileMenu() {
            const menuBtn = document.getElementById('menuToggle');
            const navLinks = document.getElementById('navLinks');
            
            if (menuBtn && navLinks) {
                menuBtn.addEventListener('click', () => {
                    navLinks.classList.toggle('active');
                    const icon = menuBtn.querySelector('i');
                    if (icon) {
                        const isOpen = navLinks.classList.contains('active');
                        icon.setAttribute('data-lucide', isOpen ? 'x' : 'menu');
                        if (window.lucide) lucide.createIcons();
                    }
                });

                // Close menu when clicking a link
                navLinks.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => {
                        navLinks.classList.remove('active');
                        const icon = menuBtn.querySelector('i');
                        if (icon) {
                            icon.setAttribute('data-lucide', 'menu');
                            if (window.lucide) lucide.createIcons();
                        }
                    });
                });
            }
        }

        /* ── 3. Auth UI Update (Exact same logic as index.html) ── */
async function updateAuthUI() {
    const isLoggedIn = sessionStorage.getItem('isLoggedIn');
    let userId = sessionStorage.getItem('userId');
    const loginBtn = document.getElementById('login-btn');
    const signupBtn = document.getElementById('signup-btn');
    const navLinksList = document.querySelector('.nav-links');

    if (isLoggedIn === 'true' && userId && loginBtn) {
        let userAvatar = "👤"; 
        
        try {
            const userSnap = await get(ref(db, `users/${userId}`));
            if (userSnap.exists() && userSnap.val().avatar) {
let avatarData = userSnap.val().avatar;

if (avatarData.startsWith('http')) {
    userAvatar = avatarData;
} else if (avatarData.startsWith('../images/')) {
    userAvatar = avatarData.replace('../', '');
} else if (avatarData.startsWith('images/')) {
    userAvatar = avatarData;
} else {
    // image-029.gif 파일명만 있는 경우
    userAvatar = `images/profiles/${avatarData}`;
}
            }
        } catch (e) { 
            console.error("Avatar Load Error:", e); 
        }

        const avatarHtml = (userAvatar.includes('/') || userAvatar.includes('http')) 
            ? `<img src="${userAvatar}" style="width:32px; height:32px; border-radius:50%; vertical-align:middle; margin-right:8px; border:1px solid var(--cyan); object-fit:cover;" onerror="this.src='https://ui-avatars.com/api/?name=${userId}'">` 
            : `<span style="margin-right:8px; font-size:1.5rem; vertical-align:middle;">${userAvatar}</span>`;

        loginBtn.innerHTML = `${avatarHtml}LOGOUT (${userId})`;
        loginBtn.href = "#";
        loginBtn.addEventListener('click', handleLogout);

        if (signupBtn) {
            signupBtn.innerText = "EDIT_PROFILE";
            signupBtn.href = "profile.html";
        }

        if (userId === 'admin' && navLinksList) {
            const adminLi = document.createElement('li');
            adminLi.style.marginLeft = "10px";
            adminLi.innerHTML = `<a href="admin.html" style="color:var(--gold); border:1px solid var(--gold); padding:5px 10px; border-radius:4px; font-weight:bold;">ADMIN_PANEL</a>`;
            navLinksList.insertBefore(adminLi, loginBtn.parentElement);
        }
    }
    // else 블록 전체 제거 (게스트 로직 삭제)
}

        /* ── 4. Logout Handler (Same as index.html) ── */
        window.handleLogout = function(e) {
            e.preventDefault();
            if(confirm("Do you want to log out of the system?")) {
                sessionStorage.clear();
                alert("Logged out successfully.");
                location.reload();
            }
        };

        /* ── 5. Cursor Animation ── */
        const dot = document.getElementById('cursor-dot');
        const ring = document.getElementById('cursor-ring');
        let mx = 0, my = 0, rx = 0, ry = 0;

        document.addEventListener('mousemove', e => {
            mx = e.clientX; 
            my = e.clientY;
            if(dot) {
                dot.style.left = mx - 3 + 'px';
                dot.style.top = my - 3 + 'px';
            }
        });

        (function animRing() {
            rx += (mx - rx) * 0.12;
            ry += (my - ry) * 0.12;
            if(ring) {
                ring.style.left = rx + 'px';
                ring.style.top = ry + 'px';
            }
            requestAnimationFrame(animRing);
        })();

  
        /* ── 7. Hero Background Setter ── */
        function setHeroBg(src) {
            const bg = document.getElementById('heroBg');
            if (!bg) return;
            const img = new Image();
            img.onload = () => { 
                bg.style.backgroundImage = `url('${src}')`;
                requestAnimationFrame(() => bg.classList.add('loaded'));
            };
            img.src = src;
        }

        function setRandomHero() {
            setHeroBg(`https://picsum.photos/1600/900?random=${Math.floor(Math.random()*1000)}`);
        }

        /* ── 8. Initialization ── */
        document.addEventListener('DOMContentLoaded', async () => {
            await loadHeader();
            loadStats();
            setRandomHero();
            
            // Initialize Lucide icons again after everything loads
            if (window.lucide) lucide.createIcons();
        });

    </script>
</body>
</html>
