<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Terminal | Jakarta Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=Space+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #010204; --surface: #0a1118;
            --chrome: #c8d8e8; --gold: #d4a843;
            --cyan: #00d4ff; --border: rgba(0,212,255,0.1);
            --text: #cdd8e3; --danger: #ff2d6e;
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Space Mono', monospace; margin: 0; padding: 20px;
        }
        .admin-container { max-width: 1000px; margin: 0 auto; }
        
        header {
            border-bottom: 2px solid var(--cyan);
            padding-bottom: 20px; margin-bottom: 30px;
            display: flex; justify-content: space-between; align-items: flex-end;
        }
        h1 { font-family: 'Syne', sans-serif; font-size: 1.5rem; margin: 0; color: var(--cyan); }
        .system-status { font-size: 0.8rem; color: var(--gold); }

        .action-bar { margin-bottom: 20px; display: flex; justify-content: flex-end; }
        .btn-add { 
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 8px 15px; cursor: pointer; font-family: 'Space Mono'; font-weight: bold;
            transition: 0.3s;
        }
        .btn-add:hover { background: var(--gold); color: black; }

        .stats-row {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 30px;
        }
        .stat-card {
            background: var(--surface); border: 1px solid var(--border);
            padding: 20px; border-radius: 4px;
        }
        .stat-card h3 { font-size: 0.7rem; color: var(--gold); margin: 0 0 10px 0; }
        .stat-card .value { font-size: 1.8rem; font-weight: bold; color: var(--chrome); }

        .table-wrapper {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 4px; overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: rgba(0,212,255,0.05); text-align: left; padding: 15px; font-size: 0.75rem; color: var(--cyan); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        tr:hover { background: rgba(255,255,255,0.02); }

        .btn-icon {
            background: none; border: 1px solid #333; color: var(--text);
            padding: 5px 8px; cursor: pointer; border-radius: 4px; transition: 0.2s;
            margin-right: 5px;
        }
        .btn-edit:hover { border-color: var(--cyan); color: var(--cyan); }
        .btn-delete:hover { border-color: var(--danger); color: var(--danger); }

        /* 모달 공통 */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-box {
            background: #0d1a24; border: 1px solid var(--cyan); padding: 30px;
            width: 100%; max-width: 400px; border-radius: 8px;
        }
        .modal-box h2 { font-family: 'Syne', sans-serif; color: var(--cyan); margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.7rem; color: var(--gold); margin-bottom: 5px; }
        .form-group input {
            width: 100%; background: #050a0f; border: 1px solid var(--border);
            padding: 10px; color: white; border-radius: 4px; box-sizing: border-box; outline: none;
        }
        .form-group input:focus { border-color: var(--cyan); }
        .modal-footer { display: flex; gap: 10px; margin-top: 20px; }
        .modal-footer button { flex: 1; padding: 12px; cursor: pointer; font-family: 'Space Mono'; font-weight: bold; }
        .btn-save { background: var(--cyan); border: none; color: black; }
        .btn-close-modal { background: #222; border: none; color: white; }

        .loading { text-align: center; padding: 50px; color: var(--gold); }
    </style>
</head>
<body>

<div class="admin-container">
    <header>
        <div>
            <h1>ADMIN_OVERRIDE_TERMINAL</h1>
            <div class="system-status">CORE_ACCESS_GRANTED // STAGE_LEVEL: 04</div>
        </div>
        <button class="btn-close-modal" onclick="location.href='index.html'" style="padding: 5px 15px; cursor: pointer;">EXIT_TO_HUB</button>
    </header>

    <div class="action-bar">
        <button class="btn-add" onclick="openAddModal()">[+] ADD_NEW_CITIZEN</button>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <h3>TOTAL_CITIZENS</h3>
            <div id="count-total" class="value">0</div>
        </div>
        <div class="stat-card">
            <h3>ACTIVE_SESSIONS</h3>
            <div id="count-online" class="value">0</div>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>IDENTITY_ID</th>
                    <th>EMAIL_ADDRESS</th>
                    <th>PASSWORD_KEY</th>
                    <th>MANAGEMENT</th>
                </tr>
            </thead>
            <tbody id="user-table-body"></tbody>
        </table>
        <div id="loading-bar" class="loading">INITIATING_DATABASE_SCAN...</div>
    </div>
</div>

<div id="add-modal" class="modal-overlay">
    <div class="modal-box" style="border-color: var(--gold);">
        <h2 style="color: var(--gold);">REGISTER_NEW_DATA</h2>
        <div class="form-group">
            <label>IDENTITY_ID</label>
            <input type="text" id="add-id" placeholder="Enter unique ID">
        </div>
        <div class="form-group">
            <label>EMAIL_ADDRESS</label>
            <input type="email" id="add-email" placeholder="citizen@jakarta.connect">
        </div>
        <div class="form-group">
            <label>PASSWORD_KEY</label>
            <input type="text" id="add-pw" placeholder="Enter secure password">
        </div>
        <div class="modal-footer">
            <button class="btn-close-modal" onclick="closeAddModal()">ABORT</button>
            <button class="btn-save" id="save-new-user" style="background: var(--gold);">CREATE_CITIZEN</button>
        </div>
    </div>
</div>

<div id="edit-modal" class="modal-overlay">
    <div class="modal-box">
        <h2>OVERRIDE_DATA</h2>
        <input type="hidden" id="edit-target-id">
        <div class="form-group">
            <label>EMAIL_ADDRESS</label>
            <input type="email" id="edit-email">
        </div>
        <div class="form-group">
            <label>PASSWORD_KEY</label>
            <input type="text" id="edit-pw">
        </div>
        <div class="modal-footer">
            <button class="btn-close-modal" onclick="closeEditModal()">ABORT</button>
            <button class="btn-save" id="save-override">APPLY_CHANGES</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, get, set, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://jakor-52390-default-rtdb.firebaseio.com/" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    lucide.createIcons();

    const userTableBody = document.getElementById('user-table-body');
    const loadingBar = document.getElementById('loading-bar');
    const countTotal = document.getElementById('count-total');
    const countOnline = document.getElementById('count-online');

    // 1. 데이터 실시간 모니터링
    onValue(ref(db, 'users'), (snapshot) => {
        loadingBar.style.display = 'none';
        userTableBody.innerHTML = '';
        const users = snapshot.val();
        
        if (users) {
            const userKeys = Object.keys(users);
            countTotal.innerText = userKeys.length;

            userKeys.forEach(key => {
                const user = users[key];
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color:var(--cyan); font-weight:bold;">${user.id}</td>
                    <td>${user.email}</td>
                    <td style="opacity:0.5;">${user.pw}</td>
                    <td>
                        <button class="btn-icon btn-edit" onclick="openEditModal('${user.id}', '${user.email}', '${user.pw}')">
                            <i data-lucide="edit-3" style="width:14px;"></i>
                        </button>
                        <button class="btn-icon btn-delete" onclick="forceDelete('${user.id}')">
                            <i data-lucide="trash-2" style="width:14px;"></i>
                        </button>
                    </td>
                `;
                userTableBody.appendChild(tr);
            });
            lucide.createIcons();
        } else {
            userTableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">NO_DATA_FOUND</td></tr>';
            countTotal.innerText = 0;
        }
    });

    onValue(ref(db, 'onlineUsers'), (snapshot) => {
        const online = snapshot.val();
        countOnline.innerText = online ? Object.keys(online).length : 0;
    });

    // 2. 회원 추가 기능
    window.openAddModal = () => {
        document.getElementById('add-modal').style.display = 'flex';
    };
    window.closeAddModal = () => {
        document.getElementById('add-modal').style.display = 'none';
        document.getElementById('add-id').value = '';
        document.getElementById('add-email').value = '';
        document.getElementById('add-pw').value = '';
    };

    document.getElementById('save-new-user').addEventListener('click', async () => {
        const id = document.getElementById('add-id').value.trim();
        const email = document.getElementById('add-email').value.trim();
        const pw = document.getElementById('add-pw').value.trim();

        if (!id || !email || !pw) {
            alert("REQUIRED_FIELDS_MISSING");
            return;
        }

        try {
            // 중복 체크
            const userCheck = await get(ref(db, 'users/' + id));
            if (userCheck.exists()) {
                alert("ERROR: IDENTITY_ID_ALREADY_EXISTS");
                return;
            }

            // 신규 저장
            await set(ref(db, 'users/' + id), { id, email, pw });
            alert(`SUCCESS: NEW_CITIZEN [${id}] REGISTERED`);
            closeAddModal();
        } catch (e) { alert("SYSTEM_ERROR: " + e.message); }
    });

    // 3. 수정 기능
    window.openEditModal = (id, email, pw) => {
        document.getElementById('edit-target-id').value = id;
        document.getElementById('edit-email').value = email;
        document.getElementById('edit-pw').value = pw;
        document.getElementById('edit-modal').style.display = 'flex';
    };
    window.closeEditModal = () => {
        document.getElementById('edit-modal').style.display = 'none';
    };

    document.getElementById('save-override').addEventListener('click', async () => {
        const id = document.getElementById('edit-target-id').value;
        const newEmail = document.getElementById('edit-email').value;
        const newPw = document.getElementById('edit-pw').value;

        try {
            await update(ref(db, 'users/' + id), { email: newEmail, pw: newPw });
            alert(`USER[${id}] DATA_MODIFIED`);
            closeEditModal();
        } catch (e) { alert("ERROR: " + e.message); }
    });

    // 4. 강제 삭제 기능
    window.forceDelete = async (id) => {
        if (confirm(`CRITICAL: Permanently erase user [${id}] from the system?`)) {
            try {
                await remove(ref(db, 'users/' + id));
                alert(`USER[${id}] TERMINATED`);
            } catch (e) { alert("ERROR: " + e.message); }
        }
    };
</script>
</body>
</html>
