<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Jakarta Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #020407; --surface: #0d1a24;
            --chrome: #c8d8e8; --gold: #d4a843;
            --cyan: #00d4ff; --border: rgba(200,216,232,0.1);
            --text: #cdd8e3;
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Syne', sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; margin: 0;
        }
        .login-box {
            background: var(--surface); border: 1px solid var(--border);
            padding: 40px; border-radius: 8px; width: 100%; max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        h2 { font-family: 'Syne', sans-serif; font-weight: 800; color: var(--chrome); margin-bottom: 30px; letter-spacing: 0.1em; text-align: center; }
        .input-group { margin-bottom: 20px; position: relative; }
        label { display: block; font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--cyan); margin-bottom: 8px; }
        
        .pw-wrapper { position: relative; width: 100%; }
        
        input {
            width: 100%; background: #060c12; border: 1px solid var(--border);
            padding: 12px; color: white; border-radius: 4px; outline: none; transition: 0.3s;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0,212,255,0.2); }
        
        .toggle-password {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            cursor: pointer; opacity: 0.6; transition: 0.3s; display: flex; align-items: center;
            color: var(--chrome);
        }
        .toggle-password:hover { opacity: 1; color: var(--cyan); }

        .btn-submit {
            width: 100%; background: var(--gold); border: none; padding: 15px;
            font-family: 'Space Mono', monospace; font-weight: bold; cursor: pointer;
            margin-top: 10px; transition: 0.3s;
        }
        .btn-submit:hover { filter: brightness(1.2); }

        .btn-guest {
            width: 100%; background: transparent; border: 1px solid rgba(200,216,232,0.3); 
            padding: 12px; color: var(--chrome); font-family: 'Space Mono', monospace; 
            font-size: 0.8rem; cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        .btn-guest:hover { 
            background: rgba(200,216,232,0.05); 
            border-color: var(--cyan);
            color: var(--cyan);
        }

        .msg { font-size: 0.8rem; margin-top: 15px; text-align: center; min-height: 20px; }
        .error { color: #ff2d6e; }
        .success { color: var(--cyan); }
        .footer-link { text-align: center; margin-top: 20px; font-size: 0.8rem; opacity: 0.7; }
        .footer-link a { color: var(--text); text-decoration: none; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>CITIZEN_LOGIN</h2>
        <form id="login-form">
            <div class="input-group">
                <label>IDENTITY_ID</label>
                <input type="text" id="user-id" placeholder="Enter your ID" required>
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <div class="pw-wrapper">
                    <input type="password" id="user-pw" placeholder="Enter your password" required>
                    <span class="toggle-password" id="pw-toggle">
                        <i data-lucide="eye"></i>
                    </span>
                </div>
            </div>
            <button type="submit" class="btn-submit">REQUEST ACCESS AUTHORIZATION</button>
            
            <button type="button" class="btn-guest" onclick="location.href='index.html'">
                > CONTINUE_AS_GUEST
            </button>
        </form>
        <div id="msg-box" class="msg"></div>
        
        <div class="footer-link">
            First time here? <a href="signup.html">Apply for Citizenship</a>
        </div>
    </div>

  <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://jakor-52390-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        lucide.createIcons();

        const pwInput = document.getElementById('user-pw');
        const pwToggle = document.getElementById('pw-toggle');

        pwToggle.addEventListener('click', () => {
            const isPassword = pwInput.type === 'password';
            pwInput.type = isPassword ? 'text' : 'password';
            pwToggle.innerHTML = isPassword 
                ? '<i data-lucide="eye-off"></i>' 
                : '<i data-lucide="eye"></i>';
            lucide.createIcons();
        });

        const form = document.getElementById('login-form');
        const msgBox = document.getElementById('msg-box');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            msgBox.innerText = "Verifying data...";
            msgBox.className = "msg";
            
            const id = document.getElementById('user-id').value;
            const pw = pwInput.value;

            try {
                const userRef = ref(db, 'users/' + id);
                const snapshot = await get(userRef);

                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    if (userData.pw === pw) {
                        msgBox.innerText = "ACCESS GRANTED. Welcome.";
                        msgBox.className = "msg success";
                        
                        sessionStorage.setItem('isLoggedIn', 'true');
                        sessionStorage.setItem('userId', id);

                        // --- [수정된 부분] 이전 페이지 주소에 따른 리다이렉션 로직 ---
                        setTimeout(() => {
                            // 1. 관리자 계정 체크
                            if (id === 'admin') {
                                location.href = 'admin.html';
                                return;
                            }

                            // 2. 이전 페이지(Referrer) 확인
                            const prevPage = document.referrer;
                            
                            if (prevPage.includes('blog.html')) {
                                // blog.html에서 왔다면 다시 blog.html로
                                location.href = 'blog.html';
                            } else {
                                // 그 외(index.html 포함)에는 index.html로
                                location.href = 'index.html';
                            }
                        }, 1500);
                        // --------------------------------------------------------
                        
                    } else {
                        msgBox.innerText = "ERROR: Password does not match.";
                        msgBox.className = "msg error";
                    }
                } else {
                    msgBox.innerText = "ERROR: ID not registered.";
                    msgBox.className = "msg error";
                }
            } catch (error) {
                msgBox.innerText = "SYSTEM ERROR: " + error.message;
                msgBox.className = "msg error";
            }
        });
    </script>
</body>
</html>
