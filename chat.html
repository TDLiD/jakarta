<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Terminal | Jakarta Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=Space+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        :root {
            --bg: #010204; 
            --surface: #0a1118;
            --surface-elevated: #0f1922;
            --chrome: #c8d8e8; 
            --gold: #d4a843;
            --cyan: #00d4ff; 
            --cyan-glow: rgba(0, 212, 255, 0.3);
            --gold-glow: rgba(212, 168, 67, 0.3);
            --border: rgba(0,212,255,0.15);
            --text: #cdd8e3; 
            --text-soft: #8b9aaa;
            --danger: #ff4d4d;
            --success: #00ff88;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #010204 0%, #0a0e14 100%);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 고급스러운 배경 효과 */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 212, 255, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(212, 168, 67, 0.03) 0%, transparent 50%);
            animation: bgPulse 15s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        /* 스캔라인 효과 */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent 0px,
                rgba(0, 212, 255, 0.01) 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1000;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateY(0); }
            100% { transform: translateY(10px); }
        }

        /* 프리미엄 헤더 */
        header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface-elevated) 100%);
            backdrop-filter: blur(20px) saturate(180%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            z-index: 10;
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.5),
                0 1px 0 rgba(0, 212, 255, 0.1) inset,
                0 0 30px rgba(0, 212, 255, 0.05);
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            animation: headerGlow 3s ease-in-out infinite;
        }

        @keyframes headerGlow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .room-info h1 {
            font-family: 'Syne', sans-serif;
            font-size: 1.3rem;
            margin: 8px 0 0 0;
            color: var(--cyan);
            text-shadow: 
                0 0 10px var(--cyan-glow),
                0 0 20px var(--cyan-glow),
                0 2px 10px rgba(0, 0, 0, 0.5);
            letter-spacing: 2px;
            animation: titlePulse 4s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { text-shadow: 0 0 10px var(--cyan-glow), 0 0 20px var(--cyan-glow); }
            50% { text-shadow: 0 0 20px var(--cyan-glow), 0 0 40px var(--cyan-glow); }
        }

        #user-display {
            font-size: 0.75rem;
            color: var(--gold);
            background: rgba(212, 168, 67, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(212, 168, 67, 0.3);
            box-shadow: 0 0 15px var(--gold-glow);
            font-weight: bold;
            letter-spacing: 1px;
        }

        .participant-bar {
            font-size: 0.7rem;
            color: var(--text-soft);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            padding: 10px 0;
        }

        .user-tag {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.08) 0%, rgba(0, 212, 255, 0.15) 100%);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 2px 10px rgba(0, 212, 255, 0.1);
        }

        .user-tag:hover {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15) 0%, rgba(0, 212, 255, 0.25) 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px var(--cyan-glow);
            border-color: var(--cyan);
        }

        .back-btn {
            color: var(--text-soft);
            text-decoration: none;
            font-size: 0.7rem;
            opacity: 0.7;
            transition: all 0.3s ease;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }

        .back-btn:hover {
            opacity: 1;
            color: var(--cyan);
            background: rgba(0, 212, 255, 0.1);
            transform: translateX(-3px);
        }

        /* 프리미엄 채팅 영역 */
        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            z-index: 5;
        }

        #chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        #chat-messages::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        #chat-messages::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--cyan), var(--gold));
            border-radius: 10px;
            box-shadow: 0 0 10px var(--cyan-glow);
        }

        #chat-messages::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, var(--gold), var(--cyan));
        }

        /* 고급스러운 메시지 버블 */
        .msg-bubble {
            max-width: 75%;
            padding: 15px 20px;
            border-radius: 12px;
            position: relative;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            animation: messageSlide 0.4s ease-out;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-bubble:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .msg-remote {
            background: linear-gradient(135deg, rgba(200, 216, 232, 0.05) 0%, rgba(200, 216, 232, 0.08) 100%);
            align-self: flex-start;
            border-left: 3px solid var(--cyan);
            box-shadow: 
                -5px 5px 20px rgba(0, 0, 0, 0.3),
                0 0 20px rgba(0, 212, 255, 0.1);
        }

        .msg-remote:hover {
            border-left-color: var(--gold);
            box-shadow: 
                -8px 8px 30px rgba(0, 0, 0, 0.5),
                0 0 30px var(--cyan-glow);
        }

        .msg-me {
            background: linear-gradient(135deg, rgba(212, 168, 67, 0.08) 0%, rgba(212, 168, 67, 0.15) 100%);
            align-self: flex-end;
            border-right: 3px solid var(--gold);
            box-shadow: 
                5px 5px 20px rgba(0, 0, 0, 0.3),
                0 0 20px var(--gold-glow);
        }

        .msg-me:hover {
            border-right-color: var(--cyan);
            box-shadow: 
                8px 8px 30px rgba(0, 0, 0, 0.5),
                0 0 30px var(--gold-glow);
        }

        .msg-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: var(--gold);
            margin-bottom: 8px;
            gap: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            flex-wrap: wrap;
        }

        .msg-text {
            font-size: 0.95rem;
            word-break: break-word;
            white-space: pre-wrap;
            line-height: 1.6;
            color: var(--text);
        }

        /* 프리미엄 호버 액션 바 */
        .msg-hover-actions {
            position: absolute;
            top: -35px;
            right: 10px;
            background: linear-gradient(135deg, var(--surface-elevated), rgba(15, 25, 34, 0.98));
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 10px;
            display: none;
            gap: 12px;
            align-items: center;
            box-shadow: 
                0 -5px 20px rgba(0, 0, 0, 0.5),
                0 0 20px var(--cyan-glow);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .msg-bubble:hover .msg-hover-actions {
            display: flex;
            animation: actionSlide 0.3s ease-out;
        }

        @keyframes actionSlide {
            from {
                opacity: 0;
                transform: translateY(5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .action-icon {
            cursor: pointer;
            font-size: 0.65rem;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s ease;
            color: var(--text-soft);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .action-icon:hover {
            background: rgba(0, 212, 255, 0.2);
            color: var(--cyan);
            transform: scale(1.1);
            box-shadow: 0 0 10px var(--cyan-glow);
        }

        /* 수정/삭제 버튼 스타일 개선 */
        .msg-actions {
            display: flex;
            gap: 10px;
            cursor: pointer;
            flex-wrap: wrap;
        }

        .msg-actions span {
            padding: 3px 8px;
            border-radius: 4px;
            transition: all 0.2s ease;
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .msg-actions span:hover {
            color: white;
            transform: scale(1.1);
        }

        .msg-actions span:first-child:hover {
            background: rgba(0, 212, 255, 0.2);
            box-shadow: 0 0 10px var(--cyan-glow);
        }

        .msg-actions span:last-child:hover {
            background: rgba(255, 77, 77, 0.2);
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.3);
        }

        /* 프리미엄 리액션 컨테이너 */
        .reaction-container {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(0, 212, 255, 0.1);
        }

        .reaction-badge {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.08), rgba(0, 212, 255, 0.15));
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .reaction-badge:hover {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 212, 255, 0.3));
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 5px 15px var(--cyan-glow);
            border-color: var(--cyan);
        }

        .reaction-badge.reacted-me {
            background: linear-gradient(135deg, rgba(212, 168, 67, 0.2), rgba(212, 168, 67, 0.3));
            border-color: var(--gold);
            box-shadow: 0 2px 8px var(--gold-glow);
        }

        .reaction-badge.reacted-me:hover {
            box-shadow: 0 5px 15px var(--gold-glow);
        }

        /* 인용 메시지 스타일 */
        .quoted-msg {
            background: rgba(0, 0, 0, 0.3);
            border-left: 2px solid var(--gold);
            padding: 8px 12px;
            margin-bottom: 8px;
            font-size: 0.75rem;
            color: var(--text-soft);
            border-radius: 4px;
            font-style: italic;
        }

        /* 프리미엄 컨트롤 패널 */
        .controls {
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface-elevated) 100%);
            backdrop-filter: blur(20px) saturate(180%);
            border-top: 1px solid var(--border);
            padding: 20px 30px;
            position: relative;
            z-index: 10;
            box-shadow: 
                0 -10px 40px rgba(0, 0, 0, 0.5),
                0 -1px 0 rgba(0, 212, 255, 0.1) inset;
        }

        .controls::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            animation: controlGlow 3s ease-in-out infinite;
        }

        @keyframes controlGlow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 답장 프리뷰 박스 */
        .reply-preview {
            background: linear-gradient(135deg, rgba(212, 168, 67, 0.1), rgba(212, 168, 67, 0.15));
            border: 1px solid rgba(212, 168, 67, 0.3);
            padding: 10px 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            font-size: 0.75rem;
            color: var(--text-soft);
            box-shadow: 0 3px 15px rgba(212, 168, 67, 0.2);
        }

        .close-reply {
            cursor: pointer;
            color: var(--danger);
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 4px;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .close-reply:hover {
            background: rgba(255, 77, 77, 0.2);
            transform: scale(1.1);
        }

        /* 프리미엄 이모티콘 바 */
        .emoji-row {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding: 10px 5px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }

        .emoji-row::-webkit-scrollbar {
            height: 4px;
        }

        .emoji-row::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        .emoji-row::-webkit-scrollbar-thumb {
            background: var(--cyan);
            border-radius: 10px;
        }

        .emoji-btn {
            cursor: pointer;
            font-size: 1.3rem;
            transition: all 0.3s ease;
            padding: 5px;
            border-radius: 6px;
            filter: grayscale(0.3);
            flex-shrink: 0;
        }

        .emoji-btn:hover {
            transform: scale(1.4) rotate(10deg);
            filter: grayscale(0) drop-shadow(0 0 10px var(--cyan-glow));
        }

        /* 프리미엄 입력 영역 */
        .input-area {
            display: flex;
            gap: 12px;
        }

        input {
            flex: 1;
            background: linear-gradient(135deg, #050a0f 0%, #0a1118 100%);
            border: 1px solid var(--border);
            padding: 14px 18px;
            color: white;
            outline: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.5);
            min-width: 0;
        }

        input:focus {
            border-color: var(--cyan);
            box-shadow: 
                inset 0 2px 8px rgba(0, 0, 0, 0.5),
                0 0 20px var(--cyan-glow);
            background: linear-gradient(135deg, #0a1118 0%, #0f1922 100%);
        }

        input::placeholder {
            color: var(--text-soft);
        }

        /* 프리미엄 전송 버튼 */
        .send-btn {
            background: linear-gradient(135deg, var(--cyan) 0%, #0099cc 100%);
            border: none;
            padding: 0 30px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            font-family: inherit;
            color: #000;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 
                0 5px 20px rgba(0, 212, 255, 0.3),
                0 0 20px var(--cyan-glow);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .send-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .send-btn:hover {
            background: linear-gradient(135deg, var(--gold) 0%, #c99a3a 100%);
            transform: translateY(-2px) scale(1.05);
            box-shadow: 
                0 8px 30px var(--gold-glow),
                0 0 40px var(--gold-glow);
        }

        .send-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .send-btn:active {
            transform: translateY(0) scale(0.98);
        }

        /* 추가 애니메이션 효과 */
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-5px);
            }
        }

        .user-tag {
            animation: float 3s ease-in-out infinite;
        }

        .user-tag:nth-child(2n) {
            animation-delay: 0.5s;
        }

        .user-tag:nth-child(3n) {
            animation-delay: 1s;
        }

        /* ========== 모바일 반응형 CSS ========== */
        
        /* 태블릿 (1024px 이하) */
        @media (max-width: 1024px) {
            header {
                padding: 18px 25px;
            }

            .room-info h1 {
                font-size: 1.2rem;
            }

            #chat-messages {
                padding: 25px 20px;
                gap: 18px;
            }

            .msg-bubble {
                max-width: 80%;
                padding: 14px 18px;
            }

            .controls {
                padding: 18px 25px;
            }
        }

        /* 모바일 (768px 이하) */
        @media (max-width: 768px) {
            header {
                padding: 15px 15px;
                gap: 10px;
            }

            .header-top {
                gap: 8px;
            }

            .room-info h1 {
                font-size: 1rem;
                letter-spacing: 1px;
                margin: 5px 0 0 0;
            }

            .back-btn {
                font-size: 0.65rem;
            }

            #user-display {
                font-size: 0.65rem;
                padding: 5px 10px;
            }

            .participant-bar {
                font-size: 0.65rem;
                gap: 6px;
                padding: 8px 0;
            }

            .user-tag {
                padding: 3px 8px;
                font-size: 0.65rem;
            }

            #chat-messages {
                padding: 20px 15px;
                gap: 15px;
            }

            .msg-bubble {
                max-width: 85%;
                padding: 12px 15px;
            }

            .msg-header {
                font-size: 0.6rem;
                gap: 10px;
            }

            .msg-text {
                font-size: 0.85rem;
            }

            .msg-hover-actions {
                top: -30px;
                padding: 5px 8px;
                gap: 8px;
            }

            .action-icon {
                font-size: 0.6rem;
                padding: 3px 6px;
            }

            .msg-actions span {
                font-size: 0.55rem;
                padding: 2px 6px;
            }

            .reaction-badge {
                font-size: 0.7rem;
                padding: 3px 8px;
            }

            .quoted-msg {
                font-size: 0.7rem;
                padding: 6px 10px;
            }

            .controls {
                padding: 15px 15px;
            }

            .reply-preview {
                font-size: 0.7rem;
                padding: 8px 12px;
                margin-bottom: 12px;
            }

            .emoji-row {
                gap: 10px;
                margin-bottom: 12px;
                padding: 8px 5px;
            }

            .emoji-btn {
                font-size: 1.1rem;
            }

            .input-area {
                gap: 10px;
            }

            input {
                padding: 12px 15px;
                font-size: 0.85rem;
            }

            .send-btn {
                padding: 0 20px;
                font-size: 0.75rem;
            }
        }

        /* 소형 모바일 (480px 이하) */
        @media (max-width: 480px) {
            header {
                padding: 12px 10px;
            }

            .room-info h1 {
                font-size: 0.9rem;
            }

            .back-btn {
                font-size: 0.6rem;
                padding: 3px 6px;
            }

            #user-display {
                font-size: 0.6rem;
                padding: 4px 8px;
            }

            .participant-bar {
                font-size: 0.6rem;
                gap: 5px;
            }

            .user-tag {
                padding: 2px 6px;
                font-size: 0.6rem;
            }

            #chat-messages {
                padding: 15px 10px;
                gap: 12px;
            }

            .msg-bubble {
                max-width: 90%;
                padding: 10px 12px;
            }

            .msg-header {
                font-size: 0.55rem;
            }

            .msg-text {
                font-size: 0.8rem;
            }

            .controls {
                padding: 12px 10px;
            }

            .emoji-row {
                gap: 8px;
                padding: 6px 3px;
            }

            .emoji-btn {
                font-size: 1rem;
            }

            input {
                padding: 10px 12px;
                font-size: 0.8rem;
            }

            .send-btn {
                padding: 0 15px;
                font-size: 0.7rem;
            }
        }

        /* 초소형 모바일 (360px 이하) */
        @media (max-width: 360px) {
            .room-info h1 {
                font-size: 0.8rem;
            }

            .msg-bubble {
                padding: 8px 10px;
            }

            .msg-text {
                font-size: 0.75rem;
            }

            .send-btn {
                padding: 0 12px;
                font-size: 0.65rem;
            }
        }

        /* 가로 모드 모바일 */
        @media (max-width: 768px) and (orientation: landscape) {
            header {
                padding: 10px 15px;
            }

            .room-info h1 {
                font-size: 0.9rem;
            }

            #chat-messages {
                padding: 15px;
            }

            .controls {
                padding: 10px 15px;
            }

            .emoji-row {
                margin-bottom: 8px;
            }
        }

        /* 터치 디바이스 최적화 */
        @media (hover: none) and (pointer: coarse) {
            .action-icon,
            .reaction-badge,
            .emoji-btn,
            .send-btn,
            .back-btn {
                min-height: 44px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }

            .msg-hover-actions {
                /* 모바일에서는 탭으로 액션 표시 */
                position: relative;
                top: auto;
                right: auto;
                display: flex;
                margin-top: 10px;
                padding: 8px;
            }

            .msg-bubble:hover .msg-hover-actions {
                display: flex;
            }
        }
/* 1. 전체 화면 높이 최적화 */
.chat-wrapper {
    display: flex;
    flex-direction: column;
    /* 기존 height: 100vh를 아래와 같이 변경 */
    height: 100vh; 
    height: 100dvh; /* dynamic vh: 주소창 제외한 실제 가시 영역 기준 */
    overflow: hidden;
}

/* 2. 채팅 컨테이너가 남은 공간을 다 차지하고 스크롤되도록 설정 */
.chat-container {
    flex: 1; /* 입력창을 제외한 나머지 공간을 모두 차지 */
    overflow-y: auto;
    padding: 20px;
    /* 하단 여백이 필요한 경우 */
    padding-bottom: 80px; 
}

/* 3. 입력창 영역을 하단에 고정 및 크기 유지 */
.chat-input-area {
    flex-shrink: 0; /* 크기가 줄어들지 않도록 고정 */
    position: sticky;
    bottom: 0;
    background: var(--surface);
    padding: 15px;
    border-top: 1px solid var(--border);
    z-index: 10;
}

/* 4. 모바일 환경에서 폰트 크기 및 높이 조정 (줌 현상 방지) */
@media (max-width: 768px) {
    .chat-input-area {
        padding: 10px;
        /* iOS 등에서 하단 여백(Safe Area) 대응 */
        padding-bottom: calc(10px + env(safe-area-inset-bottom));
    }
    
    #msg-input {
        font-size: 16px; /* 모바일 포커스 시 자동 확대 방지 */
    }
}
/* 1. 자동 줌 방지 및 기본 높이 설정 */
@media (max-width: 768px) {
    /* 모바일에서 입력창 클릭 시 화면이 확대되는 것을 방지 (폰트 16px 이상) */
    #msg-input {
        font-size: 16px !important; 
    }

    /* 전체 레이아웃을 키보드 높이에 맞게 가변적으로 설정 */
    .chat-wrapper {
        height: 100vh;
        height: -webkit-fill-available; /* iOS 주소창/키보드 대응 */
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    /* 채팅창 영역이 유연하게 줄어들도록 설정 */
    #chat-container {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
    }

    /* 입력 영역이 키보드 바로 위에 붙도록 설정 */
    .chat-input-area {
        position: relative; /* fixed 대신 relative나 sticky 권장 */
        padding-bottom: calc(10px + env(safe-area-inset-bottom)); /* 아이폰 하단 바 대응 */
        background: var(--surface);
    }
}

/* 2. 입력창과 버튼이 포함된 form 요소의 정렬 수정 */
#chat-form {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
}

/* 엔터 버튼(전송 버튼)이 압축되지 않도록 설정 */
.send-btn {
    flex-shrink: 0;
    white-space: nowrap;
}
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div class="room-info">
            <a href="index.html" class="back-btn">◄ EXIT_HUB</a>
            <h1 id="room-title">CHNL//LOADING</h1>
        </div>
        <div id="user-display" style="font-size: 0.7rem; color: var(--gold);">IDENTIFYING...</div>
    </div>
    <div class="participant-bar" id="participant-list">
        <span>ACTIVE_CITIZENS:</span>
    </div>
</header>

<div id="chat-messages"></div>

<div class="controls">
<div id="reply-box" class="reply-preview" style="display: none; align-items: center; justify-content: space-between;">
    <span id="reply-text" style="flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></span>
    <span class="close-reply" onclick="cancelReply()" style="cursor: pointer; margin-left: 10px; color: var(--gold); font-weight: bold;">[X]</span>
</div>
    <div class="emoji-row">
        <span class="emoji-btn">😎</span><span class="emoji-btn">🔥</span><span class="emoji-btn">✨</span>
        <span class="emoji-btn">🙌</span><span class="emoji-btn">👍</span><span class="emoji-btn">💻</span>
        <span class="emoji-btn">🚨</span><span class="emoji-btn">💬</span><span class="emoji-btn">📍</span>
        <span class="emoji-btn">🇮🇩</span>
    </div>
    <form class="input-area" id="chat-form">
        <input type="text" id="msg-input" placeholder="Broadcast to network..." autocomplete="off" required>
        <button type="submit" class="send-btn">SEND</button>
    </form>
</div>


<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, update, remove, set, onDisconnect, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://jakor-52390-default-rtdb.firebaseio.com/" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room') || 'general';
    const userId = sessionStorage.getItem('userId') || sessionStorage.getItem('guestId') || 'Anon_' + Math.floor(Math.random()*100);
    
    const avatarCache = {};
    let currentReplyTo = null;

    window.setReply = (sender, text) => {
        currentReplyTo = { sender, text };
        const replyBox = document.getElementById('reply-box');
        const replyText = document.getElementById('reply-text');
        replyText.innerText = `Replying to @${sender}: ${text.substring(0, 30)}...`;
        replyBox.style.display = 'flex';
        document.getElementById('msg-input').focus();
    };

    window.cancelReply = () => {
        currentReplyTo = null;
        document.getElementById('reply-box').style.display = 'none';
    };

window.addReaction = async (date, key, emoji) => {
    const basePath = date === "Legacy" 
        ? `messages/${roomId}/${key}/reactions/${emoji}` 
        : `messages/${roomId}/${date}/${key}/reactions/${emoji}`;
    
    const myReactionRef = ref(db, `${basePath}/${userId}`);
    
    try {
        const snap = await get(myReactionRef);
        if (snap.exists()) {
            await remove(myReactionRef);
            console.log(`[System] Reaction ${emoji} removed.`);
        } else {
            await set(myReactionRef, true);
            console.log(`[System] Reaction ${emoji} added.`);
        }
    } catch (e) {
        console.error("Reaction toggle error:", e);
    }
};

    async function updateGlobalOnlineStatus() {
        if (!userId) return;
        const myGlobalStatusRef = ref(db, 'onlineUsers/' + userId);
        let ipData = { ip: "Checking...", country: "..." };
        try {
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();
            ipData.ip = data.ip; ipData.country = data.country_name;
        } catch (error) { console.error("IP fetch error:", error); }

        await set(myGlobalStatusRef, { 
            id: userId, ip: ipData.ip, country: ipData.country,
            status: "IN_CHAT:" + roomId.toUpperCase(), lastChanged: serverTimestamp() 
        });
        onDisconnect(myGlobalStatusRef).remove();
    }

    const getTodayStr = () => new Date().toISOString().split('T')[0];
    const getOldDateStr = (daysAgo) => {
        const d = new Date(); d.setDate(d.getDate() - daysAgo);
        return d.toISOString().split('T')[0];
    };

    async function cleanupOldMessages() {
        const thresholdDate = getOldDateStr(7);
        try {
            const snapshot = await get(ref(db, `messages/${roomId}`));
            if (snapshot.exists()) {
                const data = snapshot.val();
                for (const key in data) {
                    if (key.length === 10 && key < thresholdDate) {
                        await remove(ref(db, `messages/${roomId}/${key}`));
                    }
                }
            }
        } catch (e) { console.error("Cleanup error:", e); }
    }

    async function getUserAvatar(uid) {
        if (!uid) return "👤";
        if (avatarCache[uid]) return avatarCache[uid];
        try {
            const snapshot = await get(ref(db, `users/${uid}/avatar`));
            const avatar = snapshot.exists() ? snapshot.val() : "👤";
            avatarCache[uid] = avatar; return avatar;
        } catch (e) { return "👤"; }
    }

async function renderMessage(dateLabel, msgId, msgData) {
    const isMe = msgData.sender === userId;
    const avatar = await getUserAvatar(msgData.sender);
    const timeStr = msgData.timestamp ? new Date(msgData.timestamp).toLocaleTimeString() : "Unknown";

    const avatarHtml = avatar.includes('/') 
        ? `<img src="${avatar}" style="width:18px; height:18px; border-radius:50%; vertical-align:middle; margin-right:4px; border:1px solid var(--cyan); object-fit:cover;">` 
        : `<span>${avatar}</span>`;

    const div = document.createElement('div');
    div.className = `msg-bubble ${isMe ? 'msg-me' : 'msg-remote'}`;
    
    let reactionsHtml = '<div class="reaction-container">';
    if (msgData.reactions) {
        Object.entries(msgData.reactions).forEach(([emoji, users]) => {
            const userList = Object.keys(users);
            const count = userList.length;
            const iReacted = users[userId] ? 'reacted-me' : ''; 
            
            if (count > 0) {
                reactionsHtml += `
                    <div class="reaction-badge ${iReacted}" onclick="addReaction('${dateLabel}', '${msgId}', '${emoji}')">
                        ${emoji} ${count}
                    </div>`;
            }
        });
    }
    reactionsHtml += '</div>';

    const hoverActions = `
        <div class="msg-hover-actions">
            <span class="action-icon" onclick="setReply('${msgData.sender}', \`${msgData.text.replace(/`/g, "\\`")}\`)">REPLY</span>
            <span class="action-icon" onclick="addReaction('${dateLabel}', '${msgId}', '🔥')">🔥</span>
            <span class="action-icon" onclick="addReaction('${dateLabel}', '${msgId}', '👍')">👍</span>
            <span class="action-icon" onclick="addReaction('${dateLabel}', '${msgId}', '🙌')">🙌</span>
        </div>
    `;

    let actionsHtml = isMe ? `
        <div class="msg-actions">
            <span onclick="editMsg('${dateLabel}', '${msgId}', '${msgData.text}')">EDIT</span>
            <span onclick="deleteMsg('${dateLabel}', '${msgId}')" style="color:var(--danger)">DEL</span>
        </div>
    ` : '';

    div.innerHTML = `
        ${hoverActions}
        <div class="msg-header">
            <span>[${dateLabel}] ${avatarHtml} ${msgData.sender || 'Anon'} (${timeStr})</span>
            ${actionsHtml}
        </div>
        ${msgData.replyTo ? `
            <div class="quoted-msg">
                >> @${msgData.replyTo.sender}: ${msgData.replyTo.text.substring(0, 50)}...
            </div>` : ''}
        <div class="msg-text">${msgData.text || ''} ${msgData.edited ? '<small>(edited)</small>' : ''}</div>
        ${reactionsHtml}
    `;
    chatContainer.appendChild(div);
}

    document.getElementById('room-title').innerText = `CHANNEL//${roomId.toUpperCase()}`;
    document.getElementById('user-display').innerText = `ID: ${userId}`;
    const chatContainer = document.getElementById('chat-messages');
    const chatForm = document.getElementById('chat-form');
    const msgInput = document.getElementById('msg-input');

    updateGlobalOnlineStatus();
    cleanupOldMessages();

    set(ref(db, `rooms/${roomId}/participants/${userId}`), true);
    onDisconnect(ref(db, `rooms/${roomId}/participants/${userId}`)).remove();

onValue(ref(db, `rooms/${roomId}/participants`), async (snapshot) => {
    const listDiv = document.getElementById('participant-list');
    listDiv.innerHTML = '<span>ACTIVE_CITIZENS:</span>';
    if(snapshot.exists()) {
        for (const u of Object.keys(snapshot.val())) {
            const avatar = await getUserAvatar(u);
            
            const avatarHtml = avatar.includes('/') 
                ? `<img src="${avatar}" style="width:14px; height:14px; border-radius:50%; vertical-align:middle; margin-right:4px;">` 
                : avatar;

            listDiv.innerHTML += `<span class="user-tag">${avatarHtml} ${u}</span>`;
        }
    }
});

    onValue(ref(db, `messages/${roomId}`), async (snapshot) => {
        chatContainer.innerHTML = '';
        if (snapshot.exists()) {
            const rootData = snapshot.val();
            const sortedKeys = Object.keys(rootData).sort();
            for (const key of sortedKeys) {
                const item = rootData[key];
                if (typeof item === 'object' && !item.sender) {
                    const msgs = Object.entries(item);
                    for (const [mId, mData] of msgs) { await renderMessage(key, mId, mData); }
                } else if (item.sender) { await renderMessage("Legacy", key, item); }
            }
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    });

    chatForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = msgInput.value.trim();
        if (text) {
            const today = getTodayStr();
            const payload = {
                sender: userId,
                text: text,
                timestamp: Date.now(),
                edited: false
            };

            if (currentReplyTo) {
                payload.replyTo = currentReplyTo;
            }

            push(ref(db, `messages/${roomId}/${today}`), payload);
            msgInput.value = '';
            window.cancelReply();
        }
    });

    window.deleteMsg = (date, key) => {
        if(confirm("Erase this broadcast?")) {
            const path = date === "Legacy" ? `messages/${roomId}/${key}` : `messages/${roomId}/${date}/${key}`;
            remove(ref(db, path));
        }
    };

    window.editMsg = (date, key, oldText) => {
        const newText = prompt("Update your broadcast:", oldText);
        if(newText && newText !== oldText) {
            const path = date === "Legacy" ? `messages/${roomId}/${key}` : `messages/${roomId}/${date}/${key}`;
            update(ref(db, path), { text: newText, edited: true });
        }
    };

    document.querySelectorAll('.emoji-btn').forEach(btn => {
        btn.onclick = () => { msgInput.value += btn.innerText; msgInput.focus(); };
    });
</script>

</body>
</html>
